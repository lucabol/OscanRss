name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Oscan
        shell: pwsh
        run: |
          $url = "https://github.com/lucabol/Oscan/releases/latest/download/oscan-windows-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile oscan.zip
          Expand-Archive oscan.zip -DestinationPath oscan
          echo "$PWD\oscan" | Out-File -Append -FilePath $env:GITHUB_PATH
      - name: Build
        shell: pwsh
        run: .\build.ps1
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build\oscanrss.exe dist\
          Copy-Item README.md dist\
          Compress-Archive -Path dist\* -DestinationPath oscanrss-windows-x64.zip
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: oscanrss-windows-x64.zip
