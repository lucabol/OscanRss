name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Install Oscan
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OSCAN_TAG=$(gh release view --repo lucabol/Oscan --json tagName --jq .tagName)
          OSCAN_VER="${OSCAN_TAG#v}"
          ARCHIVE="oscan-v${OSCAN_VER}-windows-x86_64-full.zip"
          echo "Installing Oscan $OSCAN_TAG ($ARCHIVE)"

          gh release download "$OSCAN_TAG" \
            --repo lucabol/Oscan \
            --pattern "$ARCHIVE" \
            --dir /tmp/oscan-dl

          cd /tmp/oscan-dl
          unzip -q "$ARCHIVE"

          OSCAN_BIN=$(find . -name oscan.exe -type f | head -1)
          if [ -z "$OSCAN_BIN" ]; then
            echo "ERROR: Could not find oscan.exe in archive"
            find . -type f
            exit 1
          fi
          OSCAN_DIR=$(dirname "$(realpath "$OSCAN_BIN")")
          echo "$OSCAN_DIR" >> "$GITHUB_PATH"
          echo "Oscan installed from $OSCAN_DIR"
      - name: Build
        shell: pwsh
        run: .\build.ps1
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build\oscanrss.exe dist\
          Copy-Item README.md dist\
          Compress-Archive -Path dist\* -DestinationPath oscanrss-windows-x64.zip
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: oscanrss-windows-x64.zip
