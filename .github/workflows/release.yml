name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x86_64
            oscan_archive: oscan-v{OSCAN_VER}-windows-x86_64-full.zip
            oscan_bin: oscan.exe
            output: oscanrss-windows-x86_64.exe
          - os: ubuntu-latest
            name: linux-x86_64
            oscan_archive: oscan-v{OSCAN_VER}-linux-x86_64-full.tar.xz
            oscan_bin: oscan
            output: oscanrss-linux-x86_64
          - os: macos-15
            name: macos-x86_64
            oscan_archive: oscan-v{OSCAN_VER}-macos-x86_64.tar.gz
            oscan_bin: oscan
            output: oscanrss-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Oscan
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OSCAN_TAG=$(gh release view --repo lucabol/Oscan --json tagName --jq .tagName)
          OSCAN_VER="${OSCAN_TAG#v}"
          echo "Installing Oscan $OSCAN_TAG"

          ARCHIVE_TEMPLATE="${{ matrix.oscan_archive }}"
          ARCHIVE_NAME="${ARCHIVE_TEMPLATE//\{OSCAN_VER\}/$OSCAN_VER}"

          gh release download "$OSCAN_TAG" \
            --repo lucabol/Oscan \
            --pattern "$ARCHIVE_NAME" \
            --dir /tmp/oscan-dl

          cd /tmp/oscan-dl
          case "$ARCHIVE_NAME" in
            *.zip)    unzip -q "$ARCHIVE_NAME" ;;
            *.tar.xz) tar xf "$ARCHIVE_NAME" ;;
            *.tar.gz) tar xf "$ARCHIVE_NAME" ;;
          esac

          OSCAN_BIN=$(find . -name "${{ matrix.oscan_bin }}" -type f | head -1)
          if [ -z "$OSCAN_BIN" ]; then
            echo "ERROR: Could not find ${{ matrix.oscan_bin }}"
            find . -type f
            exit 1
          fi

          OSCAN_DIR=$(dirname "$(realpath "$OSCAN_BIN")")
          chmod +x "$OSCAN_DIR/${{ matrix.oscan_bin }}" 2>/dev/null || true
          if command -v cygpath >/dev/null 2>&1; then
            OSCAN_DIR=$(cygpath -w "$OSCAN_DIR")
          fi
          echo "$OSCAN_DIR" >> "$GITHUB_PATH"
          echo "Oscan installed from $OSCAN_DIR"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          oscan main.osc -o "build/${{ matrix.output }}"
          ls -la "build/${{ matrix.output }}"

      - name: Build MSI (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ inputs.version }}'
          $version = $tag.TrimStart('v')
          # WiX requires a numeric version (x.y.z[.w])
          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') { $version = '0.0.0' }

          # Stage payload with names the .wxs expects
          New-Item -ItemType Directory -Force msi-build | Out-Null
          Copy-Item "build\${{ matrix.output }}" msi-build\oscanrss.exe

          dotnet tool install --global wix --version 5.0.2
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          wix build packaging\oscanrss.wxs `
            -d "Version=$version" `
            -d "BinDir=msi-build" `
            -o "build\oscanrss-windows-x86_64.msi"

          Get-Item build\oscanrss-windows-x86_64.msi

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for t in tests/*.osc; do
            echo "Running $t"
            oscan "$t" --run
          done

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: build/${{ matrix.output }}

      - name: Upload MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-msi
          path: build/oscanrss-windows-x86_64.msi

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: version
        run: echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries and checksums
        run: |
          mkdir -p upload
          find artifacts -type f -exec cp {} upload/ \;
          cd upload
          sha256sum * > SHA256SUMS.txt
          echo "Release files:"
          ls -la

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OscanRss ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: upload/*
